<!doctype html>
<html>
	<head>
		<meta charset="UTF-8" />
		<style>
			body {
				margin: 0;
				overflow: hidden;
			}
			#graph {
				width: 100vw;
				height: 100vh;
			}
		</style>
	</head>
	<body>
		<div id="graph"></div>
		<script src="{{VIS_NETWORK_URI}}"></script>
		<script>
			var vscodeApi = acquireVsCodeApi();
			var graphData = JSON.parse({{GRAPH_DATA}});

			// Map node ID to its state
			var nodeMap = {};
			graphData.nodes.forEach(function(node) {
				nodeMap[node.id] = {
					header: node.header,
					code: node.code,
					color: node.color,
					file: node.file,
					isTitle: node.isTitle,
					width: node.width,
					height: node.height,
					expanded: true
				};
			});

			// Constants injected from graph.ts via showGraph.ts
			var PADDING = {{PADDING}};
			var CODE_FONT_SIZE = {{CODE_FONT_SIZE}};
			var CODE_LINE_HEIGHT = {{CODE_LINE_HEIGHT}};
			var CODE_CHAR_WIDTH = {{CODE_CHAR_WIDTH}};
			var HEADER_FONT_SIZE = {{HEADER_FONT_SIZE}};
			var HEADER_HEIGHT = {{HEADER_HEIGHT}};
			var HEADER_CHAR_WIDTH = {{HEADER_CHAR_WIDTH}};
			var TITLE_FONT_SIZE = {{TITLE_FONT_SIZE}};
			var LABEL_FONT_SIZE = {{LABEL_FONT_SIZE}};
			var LABEL_GAP = {{LABEL_GAP}};

			// Other constants (e.g. colors)
			var NEWLINE = String.fromCharCode(10);
			var HEADER_COLOR = '#000000';
			var BORDER_RADIUS = 4;
			var BORDER_COLOR = '#454545';
			var CODE_BG_COLOR = '#1e1e1e';
			var CODE_FG_COLOR = '#d4d4d4';
			var LABEL_COLOR = '#888888';

			function measureNode(id) {
				var node = nodeMap[id];
				if (node.expanded) {
					return { w: node.width, h: node.height };
				}
				var headerWidth = HEADER_CHAR_WIDTH * node.header.length + PADDING * 2;
				return { w: Math.max(headerWidth, 60), h: HEADER_HEIGHT };
			}

			function drawNode(ctx, id, x, y, size) {
				var node = nodeMap[id];
				var w = size.w, h = size.h;
				var left = x - w / 2, top = y - h / 2;

				if (node.isTitle) {
					ctx.beginPath();
					ctx.roundRect(left, top, w, h, BORDER_RADIUS);
					ctx.fillStyle = node.color;
					ctx.fill();

					ctx.strokeStyle = BORDER_COLOR;
					ctx.lineWidth = 1;
					ctx.stroke();

					ctx.fillStyle = HEADER_COLOR;
					ctx.font = 'bold ' + TITLE_FONT_SIZE + 'px monospace';
					ctx.textBaseline = 'middle';
					ctx.textAlign = 'center';
					ctx.fillText(node.header, x, y);
					return;
				}

				// Background
				ctx.beginPath();
				ctx.roundRect(left, top, w, h, BORDER_RADIUS);
				ctx.fillStyle = node.color;
				ctx.fill();
				ctx.strokeStyle = BORDER_COLOR;
				ctx.lineWidth = 1;
				ctx.stroke();

				// Header text
				ctx.fillStyle = HEADER_COLOR;
				ctx.font = HEADER_FONT_SIZE + 'px monospace';
				ctx.textBaseline = 'middle';
				ctx.textAlign = 'left';
				ctx.fillText(node.header, left + PADDING, top + HEADER_HEIGHT / 2);

				if (node.expanded && node.code) {
					var codeTop = top + HEADER_HEIGHT;

					// Code background
					ctx.beginPath();
					ctx.moveTo(left, codeTop);
					ctx.lineTo(left + w, codeTop);
					ctx.lineTo(left + w, top + h - BORDER_RADIUS);
					ctx.arcTo(left + w, top + h, left + w - BORDER_RADIUS, top + h, BORDER_RADIUS);
					ctx.lineTo(left + BORDER_RADIUS, top + h);
					ctx.arcTo(left, top + h, left, top + h - BORDER_RADIUS, BORDER_RADIUS);
					ctx.lineTo(left, codeTop);
					ctx.fillStyle = CODE_BG_COLOR;
					ctx.fill();

					// Separator line
					ctx.beginPath();
					ctx.moveTo(left, codeTop);
					ctx.lineTo(left + w, codeTop);
					ctx.strokeStyle = BORDER_COLOR;
					ctx.lineWidth = 1;
					ctx.stroke();

					// Code text
					ctx.fillStyle = CODE_FG_COLOR;
					ctx.font = CODE_FONT_SIZE + 'px monospace';
					var lines = node.code.split(NEWLINE);
					for (var i = 0; i < lines.length; i++) {
						ctx.fillText(lines[i], left + PADDING, codeTop + PADDING + i * CODE_LINE_HEIGHT + CODE_FONT_SIZE / 2);
					}
				}
			}

			function wrapText(ctx, text, maxWidth) {
				var lines = [];
				var line = '';
				for (var i = 0; i < text.length; i++) {
					var test = line + text[i];
					if (ctx.measureText(test).width > maxWidth && line) {
						lines.push(line);
						line = text[i];
					} else {
						line = test;
					}
				}
				if (line) lines.push(line);
				return lines;
			}

			function drawExternalLabel(ctx, id, x, y, size) {
				var node = nodeMap[id];
				if (!node.file) return;
				ctx.fillStyle = LABEL_COLOR;
				ctx.font = LABEL_FONT_SIZE + 'px monospace';
				ctx.textBaseline = 'bottom';
				ctx.textAlign = 'left';
				var lines = wrapText(ctx, node.file, size.w);
				var lineH = LABEL_FONT_SIZE * 1.2;
				var baseY = y - size.h / 2 - LABEL_GAP;
				var leftX = x - size.w / 2;
				for (var i = lines.length - 1; i >= 0; i--) {
					ctx.fillText(lines[i], leftX, baseY - (lines.length - 1 - i) * lineH);
				}
			}

			function ctxRenderer(args) {
				var ctx = args.ctx;
				var id = args.id;
				var x = args.x;
				var y = args.y;
				var size = measureNode(id);

				return {
					drawNode: function() { drawNode(ctx, id, x, y, size); },
					drawExternalLabel: function() { drawExternalLabel(ctx, id, x, y, size); },
					nodeDimensions: { width: size.w, height: size.h }
				};
			}

			// Construct nodes, edges and network.
			var visNodes = new vis.DataSet(graphData.nodes.map(function(n) {
				return {
					id: n.id,
					x: n.x,
					y: n.y,
					color: n.color,
					shape: 'custom',
					ctxRenderer: ctxRenderer,
				};
			}));
			var visEdges = new vis.DataSet(graphData.edges);
			var container = document.getElementById('graph');

			var network = new vis.Network(
				container,
				{
					nodes: visNodes,
					edges: visEdges,
				},
				{
					edges: {
						arrows: { to: true },
						smooth: { type: 'cubicBezier' },
						// Do nothing when chosen
						chosen: false,
					},
					physics: false,
					interaction: {
						zoomView: false,
						dragView: true,
						dragNodes: true,
						// Don't highlight edges.
						selectConnectedEdges: false,
					},
				},
			);

			// Expand bounding boxes after each draw so that vis-network
			// does not cull nodes that are only partially outside the viewport.
			// Click handling uses its own hit test (findNodeAt) so the
			// inflated boxes do not affect click detection.
			network.on('afterDrawing', function() {
				var nodes = network.body.nodes;
				for (var id in nodes) {
					var bb = nodes[id].shape.boundingBox;
					if (bb) {
						bb.left = -1e9;
						bb.top = -1e9;
						bb.right = 1e9;
						bb.bottom = 1e9;
					}
				}
			});

			// Fit all nodes into view after initial draw.
			// network.fit() doesn't account for custom shape dimensions,
			// so we compute the bounding box manually.
			network.once('afterDrawing', function() {
				var minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
				graphData.nodes.forEach(function(n) {
					var hw = n.width / 2, hh = n.height / 2;
					if (n.x - hw < minX) minX = n.x - hw;
					if (n.x + hw > maxX) maxX = n.x + hw;
					if (n.y - hh < minY) minY = n.y - hh;
					if (n.y + hh > maxY) maxY = n.y + hh;
				});
				var graphW = maxX - minX;
				var graphH = maxY - minY;
				var pad = 50;
				var scaleX = (container.clientWidth - pad * 2) / graphW;
				var scaleY = (container.clientHeight - pad * 2) / graphH;
				var scale = Math.min(scaleX, scaleY, 1);
				network.moveTo({
					position: { x: (minX + maxX) / 2, y: (minY + maxY) / 2 },
					scale: scale,
					animation: false
				});
			});

			// Find the node at canvas coordinates using actual node dimensions.
			// vis-network's built-in hit test uses bounding boxes which we
			// inflate for culling prevention, so we do our own check here.
			function findNodeAt(canvasX, canvasY) {
				var bodyNodes = network.body.nodes;
				for (var id in bodyNodes) {
					var node = bodyNodes[id];
					var size = measureNode(id);
					var hw = size.w / 2, hh = size.h / 2;
					if (canvasX >= node.x - hw && canvasX <= node.x + hw &&
						canvasY >= node.y - hh && canvasY <= node.y + hh) {
						return id;
					}
				}
				return null;
			}

			// Click to toggle code expansion, Ctrl/Cmd+Click to open mark
			network.on('click', function(params) {
				var canvasPos = params.pointer.canvas;
				var id = findNodeAt(canvasPos.x, canvasPos.y);
				if (!id) return;
				var e = params.event.srcEvent;
				if (e.ctrlKey || e.metaKey) {
					vscodeApi.postMessage({ type: 'openMark', markId: id });
					return;
				}
				if (!nodeMap[id] || !nodeMap[id].code) return;
				nodeMap[id].expanded = !nodeMap[id].expanded;
				visNodes.update({ id: id, ctxRenderer: ctxRenderer });
			});

			// Event listener for wheel events
			container.addEventListener('wheel', function(e) {
				e.preventDefault();
				var pos = network.getViewPosition();
				var scale = network.getScale();
				if (e.ctrlKey || e.metaKey) {
					network.moveTo({ scale: scale * (e.deltaY > 0 ? 0.9 : 1.1) });
				} else {
					network.moveTo({ position: { x: pos.x + e.deltaX / scale, y: pos.y + e.deltaY / scale } });
				}
			}, { passive: false });

			// Event listener for messages sent from TypeScript via
			// panel.webview.postMessage()
			window.addEventListener('message', function(event) {
				var msg = event.data;
				if (msg.type === 'updateGraph') {
					msg.nodes.forEach(function(n) {
						nodeMap[n.id] = {
							header: n.header,
							code: n.code,
							color: n.color,
							file: n.file,
							isTitle: n.isTitle,
							width: n.width, height: n.height,
							expanded: true
						};
					});
					visNodes.clear();
					visNodes.add(msg.nodes.map(function(n) {
						return { id: n.id, x: n.x, y: n.y, shape: 'custom', ctxRenderer: ctxRenderer, color: n.color };
					}));
					visEdges.clear();
					visEdges.add(msg.edges);
				}
			});
		</script>
	</body>
</html>
